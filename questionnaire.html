<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilverGuard - 长者保险推荐问卷</title>

    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; color: #333; }
        .header-bar { background-color: #002677; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; }
        h2 { color: #002677; border-bottom: 2px solid #e1e4e8; padding-bottom: 15px; margin-bottom: 30px; }
        .question { margin-bottom: 25px; background: #fbfbfb; padding: 20px; border-radius: 8px; border-left: 4px solid #002677; }
        .question label.title { display: block; margin-bottom: 12px; font-weight: bold; font-size: 16px; color: #2c3e50; }
        .options { margin-left: 10px; }
        .options label { display: block; margin-bottom: 10px; font-size: 15px; cursor: pointer; padding: 8px; border-radius: 4px; transition: background 0.2s; }
        .options label:hover { background: #eef2fb; }
        .options input[type="radio"], .options input[type="checkbox"] { margin-right: 10px; transform: scale(1.2); }
        .btn-group { display: flex; justify-content: space-between; margin-top: 40px; border-top: 1px solid #e1e4e8; padding-top: 20px; }
        button { padding: 12px 30px; border: none; background-color: #002677; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #001a55; }
        button:disabled { background-color: #b0b8c6; cursor: not-allowed; }
        button.btn-prev { background-color: #6c757d; }
        button.btn-prev:hover { background-color: #5a6268; }
        .result-box { background: linear-gradient(180deg, #f4f7ff 0%, #eef3fb 100%); padding: 36px; border-radius: 20px; border: 1px solid #d7e0f0; margin-top: 20px; box-shadow: 0 14px 30px rgba(0, 38, 119, 0.08); }
        .result-title { font-size: 30px; line-height: 1.35; color: #002677; font-weight: 700; margin-bottom: 24px; letter-spacing: 0.5px; }
        .result-content p { font-size: 18px; line-height: 1.8; margin-bottom: 0; }
        .highlight { color: #e74c3c; font-weight: bold; }
        .score-info { margin-bottom: 22px; }
        .recommendation { font-size: 18px; margin: 0; }
        .result-section { background: #fff; border: 1px solid #dbe4f2; border-radius: 18px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 18px rgba(15, 39, 84, 0.05); }
        .section-title { margin: 0 0 16px; font-size: 22px; line-height: 1.5; color: #002677; font-weight: 700; }
        .section-subtitle { margin: -6px 0 16px; font-size: 15px; line-height: 1.7; color: #5f6b7a; }
        .risk-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .risk-summary-card { background: #f8fbff; border: 1px solid #d9e6f5; border-radius: 16px; padding: 18px 20px; }
        .risk-summary-label { display: block; font-size: 15px; color: #5f6b7a; margin-bottom: 10px; }
        .risk-summary-value { display: block; font-size: 30px; line-height: 1.3; font-weight: 700; color: #002677; }
        .risk-summary-value.risk-low { color: #1e874b; }
        .risk-summary-value.risk-high { color: #d64545; }
        .excluded-box { background: #fff7f7; border: 1px solid #f2cccc; border-left: 5px solid #e74c3c; }
        .excluded-list { margin: 0; padding-left: 22px; }
        .excluded-list li { margin-bottom: 10px; font-size: 18px; line-height: 1.7; }
        .empty-note { font-size: 17px; line-height: 1.8; color: #5f6b7a; }
        .combo-main { padding: 18px 20px; background: #fffaf0; border: 1px solid #f2dfae; border-left: 5px solid #f0b429; border-radius: 14px; font-size: 20px; line-height: 1.8; font-weight: 700; color: #2c3e50; }
        .combo-reason { margin-top: 16px; padding: 18px 20px; background: #f8fbff; border: 1px solid #dfe9f7; border-radius: 14px; color: #2c3e50; font-size: 17px; line-height: 1.9; }
        .hk-product-section { margin-top: 0; }
        .hk-product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .hk-product-card { background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%); border: 1px solid #d9e2f1; border-radius: 18px; padding: 22px; box-shadow: 0 12px 24px rgba(0, 38, 119, 0.06); display: flex; flex-direction: column; gap: 12px; }
        .hk-product-rank { display: inline-flex; align-items: center; align-self: flex-start; background: #002677; color: #fff; border-radius: 999px; padding: 6px 12px; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
        .hk-product-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
        .hk-product-head h3 { margin: 0; font-size: 22px; line-height: 1.5; color: #002677; }
        .hk-product-category { flex-shrink: 0; background: #eef2fb; color: #002677; border-radius: 999px; padding: 6px 12px; font-size: 13px; font-weight: 700; }
        .hk-product-company { margin: 0; color: #5f6b7a; font-size: 16px; font-weight: 700; }
        .hk-product-summary { margin: 0; font-size: 17px; line-height: 1.9; color: #2c3e50; }
        .hk-product-match { margin: 0; padding: 14px 16px; background: #f4f7ff; border-left: 4px solid #002677; border-radius: 12px; color: #2c3e50; font-size: 16px; line-height: 1.8; }
        .hk-product-meta { margin: 0; font-size: 15px; line-height: 1.8; color: #5f6b7a; }
        .hk-product-highlights { margin: 0; padding-left: 22px; }
        .hk-product-highlights li { margin-bottom: 8px; font-size: 16px; line-height: 1.7; }
        .hk-product-caution { margin-top: auto; padding: 14px 16px; background: #fff7f7; border-left: 4px solid #e74c3c; border-radius: 12px; color: #a94442; font-size: 15px; line-height: 1.8; }
        .hk-product-link { display: inline-flex; align-items: center; justify-content: center; margin-top: 4px; padding: 12px 16px; background: #002677; color: #fff; font-size: 16px; font-weight: 700; text-decoration: none; border-radius: 12px; }
        .hk-product-link:hover { background: #001a55; text-decoration: none; }
        .hk-product-group + .hk-product-group { margin-top: 28px; padding-top: 24px; border-top: 1px solid #e1e8f3; }
        .hk-product-group-title { margin: 0 0 8px; font-size: 20px; line-height: 1.5; color: #002677; font-weight: 700; }
        .hk-product-group-desc { margin: 0 0 16px; font-size: 14px; line-height: 1.8; color: #5f6b7a; }
        .hk-product-card-compact { gap: 10px; }
        .hk-product-card-compact .hk-product-summary { font-size: 16px; line-height: 1.8; }
        .hk-product-card-compact .hk-product-match { padding: 12px 14px; font-size: 15px; }
        .disclaimer-section { background: #f8fafc; border: 1px solid #d9e2ec; }

        .disclaimer-text { font-size: 15px; line-height: 1.9; color: #5f6b7a; }
        .hk-product-note { margin: -6px 0 18px; font-size: 14px; line-height: 1.8; color: #6b7788; }



    </style>
</head>
<body>
    <div class="header-bar">
        SilverGuard 长者保险推荐系统
    </div>

    <div class="container">
        <form id="insuranceForm">
            <!-- Part 1: Basic Info -->
            <div class="step active" id="step1">
                <h2>第一部分：长者基础信息评估 (1/3)</h2>

                
                <div class="question">
                    <label class="title">1. 您的年龄</label>
                    <div class="options">
                        <label><input type="radio" name="q1" value="0" required> 45岁及以下</label>
                        <label><input type="radio" name="q1" value="1"> 46–50岁</label>
                        <label><input type="radio" name="q1" value="2"> 51–59岁</label>
                        <label><input type="radio" name="q1" value="3"> 60–69岁</label>
                        <label><input type="radio" name="q1" value="4"> 70–74岁</label>
                        <label><input type="radio" name="q1" value="5"> 75岁及以上</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">2. 是否有社保/医保</label>
                    <div class="options">
                        <label><input type="radio" name="q2" value="0" required> 有职工医保</label>
                        <label><input type="radio" name="q2" value="1"> 有城乡居民医保（新农合）</label>
                        <label><input type="radio" name="q2" value="5"> 无任何医保</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">3. 所在地区医疗资源水平</label>
                    <div class="options">
                        <label><input type="radio" name="q3" value="0" required> 一线城市（北上广深）</label>
                        <label><input type="radio" name="q3" value="1"> 新一线城市 / 省会城市</label>
                        <label><input type="radio" name="q3" value="2"> 普通地级市</label>
                        <label><input type="radio" name="q3" value="3"> 县城 / 乡镇</label>
                        <label><input type="radio" name="q3" value="4"> 偏远地区（如西藏、青海、新疆部分县域）</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">4. 是否可赴港线下投保</label>
                    <div class="options">
                        <label><input type="radio" name="q4" value="0" required> 是</label>
                        <label><input type="radio" name="q4" value="2"> 否</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn-prev" style="visibility: hidden;">上一步</button>
                    <button type="button" onclick="nextStep(1)">下一步 <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Part 2: Financial Info -->
            <div class="step" id="step2">
                <h2>第二部分：家庭与财务承受能力 (2/3)</h2>

                
                <div class="question">
                    <label class="title">5. 综合财务状况（可支配资产、家庭年收入、负债）</label>
                    <div class="options">
                        <label><input type="radio" name="q5" value="0" required> A. 优秀 (资产30万+，收入10万+，无负债)</label>
                        <label><input type="radio" name="q5" value="1"> B. 良好 (资产15-30万，收入5-10万，少负债)</label>
                        <label><input type="radio" name="q5" value="3"> C. 一般 (资产5-15万，收入3-5万，中负债)</label>
                        <label><input type="radio" name="q5" value="4"> D. 较弱 (资产1-5万，收入1-3万，重负债)</label>
                        <label><input type="radio" name="q5" value="5"> E. 较差 (资产<1万，收入<1万，高额负债)</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">6. 婚姻/家庭支持情况</label>
                    <div class="options">
                        <label><input type="radio" name="q6" value="0" required> A. 已婚/有长期伴侣，共同承担家庭支出</label>
                        <label><input type="radio" name="q6" value="1"> B. 已婚/有长期伴侣，对方承担能力一般</label>
                        <label><input type="radio" name="q6" value="2"> C. 独居，有稳定子女/家属经济支持</label>
                        <label><input type="radio" name="q6" value="4"> D. 丧偶/离异/独居，家属支持不稳定</label>
                        <label><input type="radio" name="q6" value="5"> E. 丧偶/离异/独居，基本无家属支持</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">7. 抚养压力情况</label>
                    <div class="options">
                        <label><input type="radio" name="q7" value="0" required> A. 无需要抚养的家人，无抚养支出</label>
                        <label><input type="radio" name="q7" value="1"> B. 1人需要抚养，支出占收入≤20%</label>
                        <label><input type="radio" name="q7" value="3"> C. 2人需要抚养，或支出占收入20%-30%</label>
                        <label><input type="radio" name="q7" value="4"> D. 3人需要抚养，或支出占收入30%-50%</label>
                        <label><input type="radio" name="q7" value="5"> E. 4人及以上需要抚养，或支出占收入＞50%</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">8. 家庭风险兜底与分摊能力</label>
                    <div class="options">
                        <label><input type="radio" name="q8" value="0" required> A. 非家庭主要收入来源，有稳定分摊者</label>
                        <label><input type="radio" name="q8" value="1"> B. 非主要收入来源，有基本分摊者</label>
                        <label><input type="radio" name="q8" value="3"> C. 家庭重要收入来源，分摊能力一般</label>
                        <label><input type="radio" name="q8" value="4"> D. 家庭主要收入来源，基本靠自己承担</label>
                        <label><input type="radio" name="q8" value="5"> E. 家庭唯一收入来源，完全靠自己</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn-prev" onclick="prevStep(2)">上一步</button>
                    <button type="button" onclick="nextStep(2)">下一步</button>
                </div>
            </div>

            <!-- Part 3: Health Info -->
            <div class="step" id="step3">
                <h2>第三部分：健康与照护情况评估 (3/3)</h2>
                
                <div class="question">

                    <label class="title">9. 疾病情况 (可多选)</label>
                    <div class="options">
                        <label><input type="checkbox" name="q9" value="1"> A. 高血压</label>
                        <label><input type="checkbox" name="q9" value="1"> B. 糖尿病</label>
                        <label><input type="checkbox" name="q9" value="severe"> C. 心脏病 (严重)</label>
                        <label><input type="checkbox" name="q9" value="severe"> D. 中风/脑血管病</label>
                        <label><input type="checkbox" name="q9" value="1"> E. 慢性肺病</label>
                        <label><input type="checkbox" name="q9" value="severe"> F. 肾病</label>
                        <label><input type="checkbox" name="q9" value="severe"> G. 癌症</label>
                        <label><input type="checkbox" name="q9_none" value="0" onchange="handleNoneCheckbox('q9', this)"> H. 没有以上疾病 (或不清楚)</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">10. 过去一年医疗情况 (住院)</label>
                    <div class="options">
                        <label><input type="radio" name="q10" value="0" required> A. 没有</label>
                        <label><input type="radio" name="q10" value="3"> B. 住院过一次</label>
                        <label><input type="radio" name="q10" value="5"> C. 住院过两次及以上</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">11. 用药情况</label>
                    <div class="options">
                        <label><input type="radio" name="q11" value="0" required> A. 不需要长期吃药</label>
                        <label><input type="radio" name="q11" value="2"> B. 每天需吃 1-2 种药</label>
                        <label><input type="radio" name="q11" value="4"> C. 每天需吃 3 种及以上药</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">12. 行动能力</label>
                    <div class="options">
                        <label><input type="radio" name="q12" value="0" required> A. 完全可以自己活动</label>
                        <label><input type="radio" name="q12" value="2"> B. 需要拐杖或助行器</label>
                        <label><input type="radio" name="q12" value="4"> C. 需要别人帮助</label>
                        <label><input type="radio" name="q12" value="5"> D. 主要坐轮椅</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">13. 自理能力 (是否需要别人帮助 - 可多选)</label>
                    <div class="options">
                        <label><input type="checkbox" name="q13_none" value="0" onchange="handleNoneCheckbox('q13', this)"> A. 几乎不需要帮助</label>
                        <label><input type="checkbox" name="q13" value="light"> B. 买菜/购物 (轻度)</label>
                        <label><input type="checkbox" name="q13" value="light"> C. 做饭 (轻度)</label>
                        <label><input type="checkbox" name="q13" value="medium"> D. 穿衣 (中度)</label>
                        <label><input type="checkbox" name="q13" value="heavy"> E. 洗澡 (重度)</label>
                        <label><input type="checkbox" name="q13" value="heavy"> F. 管理/提醒按时吃药 (重度)</label>
                    </div>
                </div>

                <div class="question">
                    <label class="title">14. 记忆问题</label>
                    <div class="options">
                        <label><input type="radio" name="q14" value="0" required> A. 没有明显下降</label>
                        <label><input type="radio" name="q14" value="1"> B. 偶尔下降</label>
                        <label><input type="radio" name="q14" value="3"> C. 经常下降</label>
                        <label><input type="radio" name="q14" value="5"> D. 医生诊断过记忆问题 / 痴呆</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn-prev" onclick="prevStep(3)">上一步</button>
                    <button type="button" onclick="calculateResult()">生成保障建议</button>
                </div>
            </div>
            
            <!-- Result Step -->
            <div class="step" id="resultStep">
                <div class="result-box">
                    <div class="result-title">SilverGuard 长者保险保障评估报告</div>

                    <div class="score-info" id="scoreInfo">
                        <!-- Score and Risk Level render here -->
                    </div>
                    <div class="result-content" id="resultContent">
                        <!-- Exclusions and recommendations render here -->
                    </div>
                </div>
                <div style="text-align: center;">
                    <button type="button" onclick="location.reload()" style="margin-top: 30px;">重新填写问卷</button>
                    <a href="index.html" style="display:inline-block; margin-left:15px; text-decoration:none;"><button type="button" class="btn-prev">返回 SilverGuard 首页</button></a>
                </div>
            </div>

        </form>
    </div>

        function handleNoneCheckbox(groupName, checkbox) {
            const checkboxes = document.querySelectorAll(`input[type="checkbox"][name="${groupName}"]`);
            if (checkbox.checked) {
                checkboxes.forEach(cb => { cb.checked = false; });
                checkbox.checked = true;
            }
        }

        function validateStep(stepNum) {
            let valid = true;
            const stepGroup = document.getElementById("step" + stepNum);
            
            const groups = new Set();
            stepGroup.querySelectorAll('input[type="radio"][required]').forEach(el => groups.add(el.name));
            
            groups.forEach(name => {
                const checked = stepGroup.querySelector(`input[name="${name}"]:checked`);
                if (!checked) {
                    valid = false;
                }
            });
            
            if (stepNum === 3) {
                const q9None = document.querySelector('input[name="q9_none"]');
                const q13None = document.querySelector('input[name="q13_none"]');
                const q9Checked = document.querySelectorAll('input[name="q9"]:checked').length > 0 || (q9None && q9None.checked);
                const q13Checked = document.querySelectorAll('input[name="q13"]:checked').length > 0 || (q13None && q13None.checked);
                if (!q9Checked || !q13Checked) valid = false;
            }

            if (!valid) alert("请完整回答当前页面的所有问题后再继续！");
            return valid;
        }

        function nextStep(currentStep) {
            if (!validateStep(currentStep)) return;
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep + 1)).classList.add('active');
            window.scrollTo(0, 0);
        }

        function prevStep(currentStep) {
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep - 1)).classList.add('active');
            window.scrollTo(0, 0);
        }

        function getRadioValue(name) {
            const el = document.querySelector(`input[name="${name}"]:checked`);
            return el ? parseInt(el.value, 10) : 0;
        }

        function getAgeRangeFromScore(ageScore) {
            const ageRangeMap = {
                0: { minAge: 18, maxAge: 45 },
                1: { minAge: 46, maxAge: 50 },
                2: { minAge: 51, maxAge: 59 },
                3: { minAge: 60, maxAge: 69 },
                4: { minAge: 70, maxAge: 74 },
                5: { minAge: 75, maxAge: 85 }
            };
            return ageRangeMap[ageScore] || { minAge: 18, maxAge: 85 };
        }

        function escapeHTML(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getCategoryLabel(category) {
            const categoryMap = {
                medical: "医疗",
                accident: "意外",
                cancer: "防癌"
            };
            return categoryMap[category] || category;
        }

        function hasExclusionKeyword(exclusions, keywords) {
            return exclusions.some(item => {
                const text = String(item);
                return keywords.some(keyword => text.includes(keyword));
            });
        }

        function getHKProductRankScore(product, age, riskLevel, exclusions) {
            const userAgeRange = getAgeRangeFromScore(age);
            let score = 0;

            if (riskLevel >= 4) {
                if (product.category === 'accident') score += 60;
                if (product.category === 'cancer') score += 45;
                if (product.category === 'medical') score -= 20;
            } else if (riskLevel <= 2) {
                if (product.category === 'medical') score += 60;
                if (product.category === 'accident') score += 35;
                if (product.category === 'cancer') score += 15;
            } else {
                if (product.category === 'medical') score += 35;
                if (product.category === 'cancer') score += 35;
                if (product.category === 'accident') score += 30;
            }

            score += (product.elderlyPriority || 0) * (age >= 5 ? 5 : 3);
            score += (product.underwritingFlexibility || 0) * (riskLevel >= 4 ? 6 : 3);

            if (age >= 5) {
                if (product.maxAge >= 80) score += 18;
                else if (product.maxAge >= 75) score += 10;
            } else if (userAgeRange.minAge >= 60) {
                if (product.maxAge >= 75) score += 8;
            }

            if (product.category === 'medical' && hasExclusionKeyword(exclusions, ["常规百万医疗险", "百万医疗险", "部分医疗险", "普通医疗险", "高端医疗险"])) {
                score -= 80;
            }

            if (product.category === 'accident' && riskLevel >= 4) score += 15;
            if (product.category === 'cancer' && riskLevel >= 4) score += 12;
            if (product.category === 'medical' && riskLevel <= 2) score += 12;
            if (product.category === 'accident' && riskLevel <= 2) score += 8;

            return score;
        }

        function getRecommendedHKProducts(age, hk, riskLevel, exclusions) {
            const normalizedExclusions = Array.isArray(exclusions) ? exclusions : [];
            const blockedByAllHKInsurance = normalizedExclusions.some(item => String(item).includes("所有香港保险"));

            if (hk !== 0 || blockedByAllHKInsurance) {
                return [];
            }

            const userAgeRange = getAgeRangeFromScore(age);

            return hkInsuranceProducts
                .filter(product => {
                    const matchesAge = userAgeRange.maxAge >= product.minAge && userAgeRange.minAge <= product.maxAge;
                    const matchesRisk = product.suitableRiskLevels.includes(riskLevel);
                    const matchesHKRequirement = !product.hkPresenceRequired || hk === 0;
                    const matches75PlusRule = age < 5 || product.maxAge >= 75;
                    const blockedMedicalByExclusion = product.category === 'medical' && hasExclusionKeyword(normalizedExclusions, ["常规百万医疗险", "大部分百万医疗险"]);

                    return matchesAge && matchesRisk && matchesHKRequirement && matches75PlusRule && !blockedMedicalByExclusion;
                })
                .map(product => ({
                    ...product,
                    rankScore: getHKProductRankScore(product, age, riskLevel, normalizedExclusions)
                }))
                .sort((a, b) => {
                    if (b.rankScore !== a.rankScore) return b.rankScore - a.rankScore;
                    if (b.maxAge !== a.maxAge) return b.maxAge - a.maxAge;
                    return a.name.localeCompare(b.name, 'zh-Hans-CN');
                })
                .map(({ rankScore, ...product }) => product);
        }

        function getHKProductMatchReason(product, age, riskLevel) {
            const agePrefix = age >= 5 ? "结合您目前75岁以上的年龄阶段，" : age >= 3 ? "结合您当前年龄阶段，" : "结合您目前情况，";

            if (riskLevel >= 4) {
                if (product.category === 'accident') {
                    return `${agePrefix}这类意外保障通常更容易配置，可先补足基础保护。`;
                }
                if (product.category === 'cancer') {
                    return `${agePrefix}当前风险较高，优先补充更聚焦的癌症保障更有针对性。`;
                }
                return `${agePrefix}该产品可作为补充参考，但优先级低于意外和防癌保障。`;
            }

            if (riskLevel === 3) {
                if (product.category === 'cancer') {
                    return `${agePrefix}可重点补充癌症风险保障，方向更集中、更易理解。`;
                }
                if (product.category === 'accident') {
                    return `${agePrefix}可补充跌倒骨折等常见意外风险，作为基础兜底。`;
                }
                return `${agePrefix}可补充住院报销保障，适合作为当前阶段的基础配置。`;
            }

            if (product.category === 'medical') {
                return `${agePrefix}当前风险较低，住院报销类医疗保障通常更全面、更优先。`;
            }
            if (product.category === 'accident') {
                return `${agePrefix}可作为医疗保障之外的意外补充，提升日常基础保护。`;
            }
            return `${agePrefix}可作为补充性的专项保障，用于加强癌症风险防护。`;
        }

        function calculateResult() {
            if (!validateStep(3)) return;

            const age = getRadioValue('q1');
            const medicalIns = getRadioValue('q2');
            const region = getRadioValue('q3');
            const hk = getRadioValue('q4');
            const q5 = getRadioValue('q5');
            const q6 = getRadioValue('q6');
            const q7 = getRadioValue('q7');
            const q8 = getRadioValue('q8');
            const q10 = getRadioValue('q10');
            const q11 = getRadioValue('q11');
            const q12 = getRadioValue('q12');
            const q14 = getRadioValue('q14');

            let q9Score = 0;
            let severeCount = 0;
            let lightCount = 0;
            const q9Els = document.querySelectorAll('input[name="q9"]:checked');
            q9Els.forEach(el => {
                if (el.value === 'severe') severeCount++;
                if (el.value === '1') lightCount++;
            });
            if (severeCount > 0) q9Score = 4;
            else if (lightCount === 1) q9Score = 2;
            else if (lightCount === 2) q9Score = 3;
            else if (lightCount >= 3) q9Score = 4;
            if (severeCount + lightCount > 1 && severeCount > 0) q9Score = 5;

            let q13Score = 0;
            let hCount = 0, mCount = 0, lCount = 0;
            const q13Els = document.querySelectorAll('input[name="q13"]:checked');
            q13Els.forEach(el => {
                if (el.value === 'heavy') hCount++;
                if (el.value === 'medium') mCount++;
                if (el.value === 'light') lCount++;
            });
            if (lCount === 1 && mCount === 0 && hCount === 0) q13Score = 1;
            else if ((lCount >= 2 && hCount === 0) || (mCount === 1 && hCount === 0)) q13Score = 2;
            else if (hCount === 1) q13Score = 3;
            else if (hCount >= 2) q13Score = 5;
            else if (lCount + mCount + hCount >= 3) q13Score = 4;

            let totalScore = age + medicalIns + region + hk + q5 + q6 + q7 + q8 + q9Score + q10 + q11 + q12 + q13Score + q14;
            let riskLevel = 0;
            if (totalScore >= 25) riskLevel = 5;
            else if (totalScore >= 20) riskLevel = 4;
            else if (totalScore >= 15) riskLevel = 3;
            else if (totalScore >= 10) riskLevel = 2;
            else if (totalScore >= 5) riskLevel = 1;

            const riskDesc = ["极低风险", "低风险", "中低风险", "中风险", "中高风险", "高风险"][riskLevel];

            let exclusions = [];
            if (age >= 4) exclusions.push("重疾险", "定期寿险");
            if (age >= 5) exclusions.push("长期护理险", "常规百万医疗险");
            if (medicalIns === 5) exclusions.push("要求社保身份的百万医疗险");
            if (hk === 2) exclusions.push("所有香港保险");
            if (severeCount > 0 || (severeCount + lightCount >= 3)) exclusions.push("重疾险", "定期寿险(大概率)", "部分百万医疗险");
            if (q12 >= 4) exclusions.push("重疾险", "定期寿险", "大部分百万医疗险");
            if (hCount >= 2 || q13Score === 5) exclusions.push("重疾险", "定期寿险", "百万医疗险");
            if (q14 === 5) exclusions.push("重疾险", "定期寿险", "百万医疗险");
            if (q10 >= 5) exclusions.push("百万医疗险(大概率拒保)", "重疾险(大概率拒保)");
            if (q11 >= 4 || (lightCount + severeCount) >= 2) exclusions.push("部分医疗险", "部分重疾");
            if (q5 === 5) exclusions.push("长期护理险", "分红型/储蓄型保险", "高端医疗险");
            if (q6 === 5 && q13Score > 0) exclusions.push("普通医疗险");
            if (q7 === 5) exclusions.push("长期缴费类保险(寿险、储蓄险)");
            
            exclusions = [...new Set(exclusions)];

            let recommendationStr = "";
            let reasonStr = "";
            
            if (riskLevel <= 1) {
                recommendationStr = "百万医疗险 + 意外险 + 护理险 + 可选重疾险/寿险";
                reasonStr = "年龄、医保、地区约束较少，可做相对完整配置；医疗险打底，意外险覆盖高频跌倒骨折风险。";
            } else if (riskLevel === 2) {

                reasonStr = "以“医疗报销 + 意外”作为核心，防癌/护理作为补充；预算等允许时再考虑重疾险或寿险。";

                reasonStr = "核心目标变成“保得上、买得起、能理赔”；主推低门槛的险种。";

            const hkProductHTML = renderHKProductCards(recommendedHKProducts, age, riskLevel);

                        <h3 class="section-title">不建议优先考虑的险种</h3>

            document.getElementById('resultContent').innerHTML = `
